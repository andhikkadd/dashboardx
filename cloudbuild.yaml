steps:
  # Step 1: Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', 'gcr.io/$PROJECT_ID/dashboard-x:latest', 
      '.'
    ]
  
  # Step 2: Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/dashboard-x:latest']
  
  # Step 3: Deploy to Google Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'dashboard-x'
      - '--image=gcr.io/$PROJECT_ID/dashboard-x:latest'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      # Adjust concurrency and memory for Playwright browser overhead
      - '--memory=2Gi'
      - '--cpu=2'
      - '--min-instances=0'
      - '--max-instances=5'

images:
  - 'gcr.io/$PROJECT_ID/dashboard-x:latest'
